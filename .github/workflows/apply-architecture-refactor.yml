name: Apply Weekly-Report Architecture Refactor

on:
  push:
    branches:
      - agent/simplify-weekly-report-architecture
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: weekly-report-architecture-refactor
  cancel-in-progress: false

jobs:
  refactor:
    if: github.head_ref == 'agent/simplify-weekly-report-architecture' || github.ref_name == 'agent/simplify-weekly-report-architecture'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout refactor branch
        uses: actions/checkout@v4
        with:
          ref: agent/simplify-weekly-report-architecture
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Escape generated template expressions
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('scripts/apply-architecture-refactor.mjs')
          text = p.read_text()
          replacements = {
            '${script}': r'\${script}',
            '${required}': r'\${required}',
            '${scriptRefs.join(", ")}': r'\${scriptRefs.join(", ")}',
            '${queries.length}': r'\${queries.length}',
            '${sources.length}': r'\${sources.length}',
            '${syntaxFiles.length}': r'\${syntaxFiles.length}',
            '${{ secrets.OPENAI_API_KEY }}': r'\${{ secrets.OPENAI_API_KEY }}',
            "${{ vars.OPENAI_SUMMARY_MODEL || 'gpt-5.4-mini' }}": r"\${{ vars.OPENAI_SUMMARY_MODEL || 'gpt-5.4-mini' }}",
            '${attempt}': r'\${attempt}',
          }
          for old, new in replacements.items():
            text = text.replace(old, new)
          p.write_text(text)
          PY

      - name: Apply architecture refactor
        run: node scripts/apply-architecture-refactor.mjs

      - name: Install dependencies and create lockfile
        run: npm install --no-audit --no-fund

      - name: Validate structure and syntax
        run: npm run validate

      - name: Smoke-test DOCX generation
        run: |
          node - <<'NODE' > /tmp/selection.json
          const fs = require('fs');
          const payload = JSON.parse(fs.readFileSync('data/news.json', 'utf8'));
          const article = (payload.articles || []).find((item) => item.titleKo && ['politics','terror_security','oil_economy','regional'].includes(item.category3));
          if (!article) throw new Error('No report article available for smoke test');
          process.stdout.write(JSON.stringify([article]));
          NODE
          SELECTION_JSON="$(cat /tmp/selection.json)" REPORT_DATE="2026-07-14" REPORT_START_DATE="2026-07-07" REPORT_END_DATE="2026-07-13" npm run report
          test -s reports/latest.docx

      - name: Remove smoke-test output
        run: |
          rm -f reports/latest.docx reports/latest.json
          find reports/generated -type f ! -name '.gitkeep' -delete
          git checkout -- data/selected-news.json reports || true

      - name: Commit refactored architecture
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --stat
          git commit -m "Simplify Weekly-Report architecture"
          git push origin HEAD:agent/simplify-weekly-report-architecture
