name: Collect Iraq Weekly News

on:
  workflow_dispatch:
  schedule:
    # KST 06:17 primary, 06:47 backup retry
    - cron: "17 21 * * *"
    - cron: "47 21 * * *"

permissions:
  contents: write

concurrency:
  group: collect-iraq-weekly-news
  cancel-in-progress: false

jobs:
  collect-news:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Sync latest main
        run: |
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Collect Iraq weekly news
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_SUMMARY_MODEL: ${{ vars.OPENAI_SUMMARY_MODEL || 'gpt-5-mini' }}
          OPENAI_REPORT_MODEL: ${{ vars.OPENAI_REPORT_MODEL || 'gpt-5.4-mini' }}
          OPENAI_REPORT_REASONING: ${{ vars.OPENAI_REPORT_REASONING || 'medium' }}
          REPORT_REFINEMENT_MIN_SCORE: "70"
          MAX_REPORT_REFINEMENT_ITEMS: "20"
          REPORT_REFINEMENT_CONCURRENCY: "2"
          NEWS_LOOKBACK_DAYS: "30"
          MAX_PER_QUERY: "12"
          MAX_TOTAL: "260"
          FETCH_TIMEOUT_MS: "12000"
          GOOGLE_QUERY_CONCURRENCY: "6"
          SOURCE_CONCURRENCY: "3"
          ARTICLE_FETCH_CONCURRENCY: "4"
          AI_CONCURRENCY: "5"
          FULLTEXT_HYDRATION_CONCURRENCY: "4"
          MIN_FULLTEXT_CHARS_FOR_AI: "500"
          MIN_RSS_DESCRIPTION_CHARS_FOR_AI: "300"
          HIGH_PRIORITY_RSS_FALLBACK_SCORE: "90"
          MAX_NEW_AI_ITEMS: "260"
        run: |
          for attempt in 1 2 3; do
            echo "Collect Iraq weekly news attempt ${attempt}/3"
            if npm run collect; then
              echo "Collect Iraq weekly news succeeded"
              break
            fi
            if [ "$attempt" = "3" ]; then
              echo "Collect Iraq weekly news failed after 3 attempts"
              exit 1
            fi
            sleep $((attempt * 90))
          done

      - name: Refine high-value report writing
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_REPORT_MODEL: ${{ vars.OPENAI_REPORT_MODEL || 'gpt-5.4-mini' }}
          OPENAI_REPORT_REASONING: ${{ vars.OPENAI_REPORT_REASONING || 'medium' }}
          REPORT_REFINEMENT_MIN_SCORE: "70"
          MAX_REPORT_REFINEMENT_ITEMS: "20"
          REPORT_REFINEMENT_CONCURRENCY: "2"
        run: node scripts/refine-report-writing.mjs

      - name: Post-process collected news
        run: npm run postprocess

      - name: Sync latest main before commit
        run: |
          git config pull.rebase true
          git pull --rebase --autostash origin main

      - name: Commit updated news data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update Iraq weekly news data"
          file_pattern: "data/*.json"
